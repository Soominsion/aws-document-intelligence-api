name: CI

on:
  push:
  pull_request:

jobs:
  basic-validation:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci-test.db
      ENABLE_S3: "false"
      ENABLE_DYNAMODB: "false"
      AWS_REGION: ap-northeast-2
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify FastAPI import
        run: python -c "from app.main import app; print(app.title)"

      - name: Run tests
        run: pytest

  deployment-changes:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for deployable changes
        id: filter
        run: |
          before="${{ github.event.before }}"
          if [[ "$before" =~ ^0+$ ]]; then
            changed_files="$(git ls-tree -r --name-only "${{ github.sha }}")"
          else
            changed_files="$(git diff --name-only "$before" "${{ github.sha }}")"
          fi

          if grep -Eq '^(app/|requirements\.txt$|requirements-ml\.txt$|\.github/workflows/|scripts/|tests/)' <<< "$changed_files"; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs:
      - basic-validation
      - deployment-changes
    if: needs.deployment-changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" <<'EOF'
            cd /home/ubuntu/aws-document-intelligence-api
            git pull origin main
            source .venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart doc-intelligence
            sudo systemctl status doc-intelligence --no-pager
          EOF

      - name: Remove SSH private key
        if: always()
        run: rm -f ~/.ssh/ec2_key
