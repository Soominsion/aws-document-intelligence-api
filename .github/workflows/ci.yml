name: CI

on:
  push:
  pull_request:

jobs:
  basic-validation:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci-test.db
      ENABLE_S3: "false"
      ENABLE_DYNAMODB: "false"
      AWS_REGION: ap-northeast-2
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify FastAPI import
        run: python -c "from app.main import app; print(app.title)"

      - name: Run tests
        run: pytest

  deploy:
    needs: basic-validation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2_key "$EC2_USER@$EC2_HOST" <<'EOF'
            cd /home/ubuntu/aws-document-intelligence-api
            git pull origin main
            source .venv/bin/activate
            pip install -r requirements.txt
            sudo systemctl restart doc-intelligence
            sudo systemctl status doc-intelligence --no-pager
          EOF

      - name: Remove SSH private key
        if: always()
        run: rm -f ~/.ssh/ec2_key
